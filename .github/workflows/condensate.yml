name: Condensate vacuum
run-name: condensate-vacuum
on: 
  workflow_dispatch:
    inputs:
      vacuum-name:
        description: 'Vacuum name'
        type: string
  workflow_call:
jobs:
  condensate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Condensate ${{ inputs.vacuum-name }}
        run: ./vcondensate ${{ inputs.vacuum-name }}
      
      - name: Upload to SourceForge
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" | tr -d '\r' | sed -e '$a\' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -l -f ~/.ssh/id_ed25519
          ssh-keyscan frs.sourceforge.net >> ~/.ssh/known_hosts

          DIR=$(ls | grep ${{ inputs.vacuum-name }})
          scp -r $DIR aevod@frs.sourceforge.net:/home/frs/project/zero-linux/
