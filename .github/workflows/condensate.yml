name: Condensate vacuum
run-name: condensate-vacuum
on: 
  workflow_dispatch:
    inputs:
      vacuum-name:
        description: 'Vacuum name'
        type: string
  workflow_call:
jobs:
  condensate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Condensate ${{ inputs.vacuum-name }}
        run: ./vcondensate ${{ inputs.vacuum-name }}
      
      - name: Push to voids
        run: |
          git config --global user.name "Zero linux vacuum condensator"
          git config --global user.email "zero-condensator@zerolinux.dpdns.org"
          git clone https://x-access-token:${{ secrets.VOID_PUSH_TOKEN }}@github.com/0-linux/zero-voids.git voids
          DIR=$(ls | grep ${{ inputs.vacuum-name }})
          mkdir ./voids/spaces/ -p
          rm -rf ./voids/spaces/$DIR
          mkdir ./voids/spaces/$DIR
          mv ./$DIR/*vdata ./voids/spaces/$DIR/
          cd voids
          git add .
          git commit -m "Automatically updated/added vacuum ${{ inputs.vacuum-name }}"
          git push -u origin main

      - name: Upload .void to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "binaries"
          overwrite: true     
          prerelease: false
          files: |
            ./${{ inputs.vacuum-name }}_*/*.void
        env:
          GITHUB_TOKEN: ${{ secrets.VOID_PUSH_TOKEN }}
