name: Condensate vacuum
run-name: condensate-vacuum
on: 
  workflow_dispatch:
    inputs:
      vacuum-name:
        description: 'Vacuum name'
        type: string
  workflow_call:
jobs:
  condensate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Condensate ${{ inputs.vacuum-name }}
        run: ./vcondensate ${{ inputs.vacuum-name }}
      
      - name: Setup ssh
        env:
          SSH_KEY: ${{ secrets.SF_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan frs.sourceforge.net >> ~/.ssh/known_hosts
          ssh-keyscan web.sourceforge.net >> ~/.ssh/known_hosts

      - name: Remove previous revs from SourceForge
        run: |
          echo "rm /home/frs/project/zero-linux/spaces/${{ inputs.vacuum-name }}*/*" | sftp aevod@frs.sourceforge.net
          echo "rm /home/project-web/zero-linux/htdocs/spaces/${{ inputs.vacuum-name }}*/*" | sftp aevod@frs.sourceforge.net
          echo "rmdir /home/frs/project/zero-linux/spaces/${{ inputs.vacuum-name }}*" | sftp aevod@frs.sourceforge.net
          echo "rmdir /home/project-web/zero-linux/htdocs/spaces/${{ inputs.vacuum-name }}*" | sftp aevod@frs.sourceforge.net

      - name: Upload to SourceForge
        run: |
          DIR=$(ls | grep ${{ inputs.vacuum-name }})
          scp -r $DIR aevod@frs.sourceforge.net:/home/frs/project/zero-linux/spaces/
          scp -r $DIR aevod@web.sourceforge.net:/home/project-web/zero-linux/htdocs/spaces/

      - name: Download .vdata's
        run: |
          mkdir spaces
          scp -r aevod@frs.sourceforge.net:/home/frs/project/zero-linux/spaces/* ./spaces/ || true

      - name: Update voidlist.db
        run: |
          ./update-voidlist
          scp ./voidlist.db aevod@frs.sourceforge.net:/home/frs/project/zero-linux/
          scp ./voidlist.db aevod@web.sourceforge.net:/home/project-web/zero-linux/htdocs/
