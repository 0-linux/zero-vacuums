name: Condensate all vacuums
run-name: condensate-all-vacuums
on: 
  workflow_dispatch:
  workflow_call:
jobs:
  condensate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Condensate all vacuums
        run: |
          for vac in vacuums/*;
          do
            vacname=$(basename $vac)
            echo $vacname
          done
      
